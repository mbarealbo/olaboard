  <!-- White face oval -->
  <path d="M 9.5 14 C 9.5 8, 12.5 5.5, 16 5.5 C 19.5 5.5, 22.5 8, 22.5 14 L 22.5 20 C 22.5 23.5, 19.5 26, 16 26 C 12.5 26, 9.5 23.5, 9.5 20 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>

  <!-- Black horizontal notepad bar -->
